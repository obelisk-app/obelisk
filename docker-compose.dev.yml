services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: obelisk
      POSTGRES_DB: obelisk
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LiveKit SFU for testing large-room voice. Uses baked-in dev
  # credentials. For production, credentials come from .env.production and
  # the service lives in docker-compose.yml behind a `livekit` profile.
  #
  # Config is passed via LIVEKIT_CONFIG (YAML) instead of CLI flags
  # because newer livekit-server versions removed `--rtc.use-external-ip`
  # in favor of nested config keys (rtc.use_external_ip).
  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        bind_addresses:
          - 0.0.0.0
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 50100
          use_external_ip: true
        keys:
          devkey: devsecret-must-be-at-least-32-chars
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"

volumes:
  pgdata_dev:
