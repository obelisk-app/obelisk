services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: obelisk
      POSTGRES_PASSWORD: obelisk
      POSTGRES_DB: obelisk
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obelisk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
