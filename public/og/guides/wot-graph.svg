<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Web of Trust score computation" class="w-full h-auto"><rect width="800" height="320" fill="#0a0a0a"></rect><g><rect x="60" y="110" width="140" height="90" rx="12" fill="#171717" stroke="#b4f953" stroke-width="1.5"></rect><circle cx="80" cy="128" r="12" fill="#b4f953"></circle><text x="80" y="133" text-anchor="middle" font-size="12" font-weight="800" fill="#0a0a0a">1</text><text x="100" y="134" font-size="13" font-weight="700" fill="#fafafa">kind 3</text><text x="130" y="175" text-anchor="middle" font-size="11" fill="#a3a3a3" font-family="monospace">follow list</text></g><g><rect x="260" y="110" width="140" height="90" rx="12" fill="#171717" stroke="#b4f953" stroke-width="1.5"></rect><circle cx="280" cy="128" r="12" fill="#b4f953"></circle><text x="280" y="133" text-anchor="middle" font-size="12" font-weight="800" fill="#0a0a0a">2</text><text x="300" y="134" font-size="13" font-weight="700" fill="#fafafa">graph walk</text><text x="330" y="175" text-anchor="middle" font-size="11" fill="#a3a3a3" font-family="monospace">1–2 hops</text></g><g><rect x="460" y="110" width="140" height="90" rx="12" fill="#171717" stroke="#b4f953" stroke-width="1.5"></rect><circle cx="480" cy="128" r="12" fill="#b4f953"></circle><text x="480" y="133" text-anchor="middle" font-size="12" font-weight="800" fill="#0a0a0a">3</text><text x="500" y="134" font-size="13" font-weight="700" fill="#fafafa">score</text><text x="530" y="175" text-anchor="middle" font-size="11" fill="#a3a3a3" font-family="monospace">weighted sum</text></g><g><rect x="660" y="110" width="140" height="90" rx="12" fill="#171717" stroke="#b4f953" stroke-width="1.5"></rect><circle cx="680" cy="128" r="12" fill="#b4f953"></circle><text x="680" y="133" text-anchor="middle" font-size="12" font-weight="800" fill="#0a0a0a">4</text><text x="700" y="134" font-size="13" font-weight="700" fill="#fafafa">gate</text><text x="730" y="175" text-anchor="middle" font-size="11" fill="#a3a3a3" font-family="monospace">allow / filter</text></g><g stroke="#b4f953" stroke-width="2" fill="none" stroke-linecap="round"><g><line x1="200" y1="155" x2="260" y2="155" stroke-dasharray="6 6"  style="animation-delay:0s"></line><polygon points="254,151 262,155 254,159" fill="#b4f953"></polygon></g><g><line x1="400" y1="155" x2="460" y2="155" stroke-dasharray="6 6"  style="animation-delay:0.3s"></line><polygon points="454,151 462,155 454,159" fill="#b4f953"></polygon></g><g><line x1="600" y1="155" x2="660" y2="155" stroke-dasharray="6 6"  style="animation-delay:0.6s"></line><polygon points="654,151 662,155 654,159" fill="#b4f953"></polygon></g></g><g><rect x="200" y="240" width="400" height="56" rx="8" fill="#2d3a1a" stroke="#b4f953" stroke-width="1"></rect><text x="400" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#b4f953" font-family="monospace">score = Σ (hop_weight × mutual_bonus × activity)</text><text x="400" y="284" text-anchor="middle" font-size="10" fill="#a3a3a3">Higher = trusted. Below threshold → posts hidden on public channels.</text></g><text x="400" y="40" text-anchor="middle" font-size="16" font-weight="700" fill="#fafafa">How a trust score is computed</text><text x="400" y="62" text-anchor="middle" font-size="11" fill="#a3a3a3">Pure Nostr data — no KYC, no CAPTCHA, no phone number.</text></svg>