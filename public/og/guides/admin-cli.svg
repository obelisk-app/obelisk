<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hero-cli-title hero-cli-desc" class="w-full h-auto"><title id="hero-cli-title">Admin CLI for coding agents</title><desc id="hero-cli-desc">A terminal window streaming admin commands, wired to an AI agent avatar that signs Nostr challenges and drives the Obelisk admin API.</desc><defs><linearGradient id="sky-cli" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0a0a"></stop><stop offset="100%" stop-color="#0f1a08"></stop></linearGradient><radialGradient id="agent-glow" cx="0.5" cy="0.5" r="0.6"><stop offset="0%" stop-color="#b4f953" stop-opacity="0.4"></stop><stop offset="100%" stop-color="#b4f953" stop-opacity="0"></stop></radialGradient></defs><rect width="800" height="400" fill="url(#sky-cli)"></rect><g opacity="0.1" stroke="#b4f953" stroke-width="0.5"><line x1="0" y1="40" x2="800" y2="40"></line><line x1="0" y1="80" x2="800" y2="80"></line><line x1="0" y1="120" x2="800" y2="120"></line><line x1="0" y1="160" x2="800" y2="160"></line><line x1="0" y1="200" x2="800" y2="200"></line><line x1="0" y1="240" x2="800" y2="240"></line><line x1="0" y1="280" x2="800" y2="280"></line><line x1="0" y1="320" x2="800" y2="320"></line><line x1="0" y1="360" x2="800" y2="360"></line><line x1="0" y1="400" x2="800" y2="400"></line></g><g><rect x="180" y="60" width="440" height="280" rx="12" fill="#0f0f0f" stroke="#b4f953" stroke-width="1.6"></rect><rect x="180" y="60" width="440" height="28" rx="12" fill="#171717"></rect><rect x="180" y="74" width="440" height="14" fill="#171717"></rect><circle cx="198" cy="74" r="5" fill="#b45353"></circle><circle cx="214" cy="74" r="5" fill="#f7b32b"></circle><circle cx="230" cy="74" r="5" fill="#b4f953"></circle><text x="400" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" font-family="monospace">obelisk admin cli</text><g font-family="monospace" font-size="12"><text x="200" y="110" fill="#a3a3a3"  style="animation-delay:0s;animation-fill-mode:both">$ npm run admin -- login --bunker bunker://...</text><text x="200" y="142" fill="#b4f953"  style="animation-delay:0.6s;animation-fill-mode:both">✓ authenticated as npub1agent…</text><text x="200" y="174" fill="#a3a3a3"  style="animation-delay:1.2s;animation-fill-mode:both">$ npm run admin -- servers list</text><text x="200" y="206" fill="#fafafa"  style="animation-delay:1.8s;animation-fill-mode:both">→ obelisk.ar · la-crypta · test-server</text><text x="200" y="238" fill="#a3a3a3"  style="animation-delay:2.4s;animation-fill-mode:both">$ npm run admin -- channels create sv1 …</text><text x="200" y="270" fill="#b4f953"  style="animation-delay:3.0s;animation-fill-mode:both">✓ #announcements created</text><rect x="200" y="291" width="9" height="14" fill="#b4f953" ><animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"></animate></rect></g></g><g><circle cx="90" cy="200" r="56" fill="url(#agent-glow)"  style="transform-origin:90px 200px;transform-box:fill-box"></circle><rect x="54" y="164" width="72" height="72" rx="14" fill="#171717" stroke="#b4f953" stroke-width="1.8"></rect><circle cx="76" cy="196" r="5" fill="#b4f953"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"></animate></circle><circle cx="104" cy="196" r="5" fill="#b4f953"><animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.3s" repeatCount="indefinite"></animate></circle><line x1="90" y1="164" x2="90" y2="148" stroke="#b4f953" stroke-width="1.8"></line><circle cx="90" cy="144" r="4" fill="#b4f953"  style="transform-origin:90px 144px"></circle><rect x="78" y="212" width="24" height="4" rx="2" fill="#b4f953" opacity="0.7"></rect><text x="90" y="276" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" font-family="monospace">AI agent</text></g><g><rect x="670" y="150" width="90" height="100" rx="12" fill="#171717" stroke="#b4f953" stroke-width="1.6"></rect><polygon points="715,168 705,232 725,232" fill="#b4f953" opacity="0.85"></polygon><rect x="700" y="232" width="30" height="4" fill="#b4f953" opacity="0.7"></rect><text x="715" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#a3a3a3" font-family="monospace">/api/admin</text></g><g stroke="#b4f953" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"><line x1="130" y1="200" x2="180" y2="200" stroke-dasharray="4 10" ></line><line x1="620" y1="200" x2="670" y2="200" stroke-dasharray="4 10"  style="animation-delay:0.4s"></line></g><g><rect x="320" y="348" width="160" height="26" rx="13" fill="#0a0a0a" stroke="#b4f953" stroke-width="1.5"></rect><text x="400" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#b4f953" font-family="monospace">signed with nsec / NIP-46</text></g><g font-size="11" font-weight="600"><rect x="34" y="18" width="12" height="12" rx="2" fill="#b4f953"></rect><text x="52" y="28" fill="#fafafa">role-checked endpoints</text><rect x="220" y="18" width="12" height="12" rx="2" fill="#171717" stroke="#b4f953" stroke-width="1.5"></rect><text x="238" y="28" fill="#fafafa">same API as /admin</text></g></svg>