310" stroke="#b4f953" stroke-opacity="0.45" stroke-dasharray="0"></line><line x1="260" y1="120" x2="540" y2="120" stroke="#b4f953" stroke-opacity="0.45" stroke-dasharray="0"></line><line x1="140" y1="180" x2="70" y2="90" stroke="#b45353" stroke-opacity="0.25" stroke-dasharray="3 5"></line><line x1="660" y1="180" x2="730" y2="90" stroke="#b45353" stroke-opacity="0.25" stroke-dasharray="3 5"></line><line x1="200" y1="250" x2="50" y2="320" stroke="#b45353" stroke-opacity="0.25" stroke-dasharray="3 5"></line></g><g stroke="#b4f953" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"><line x1="400" y1="200" x2="260" y2="120" stroke-dasharray="4 10" ></line><line x1="400" y1="200" x2="540" y2="120" stroke-dasharray="4 10"  style="animation-delay:0.5s"></line><line x1="400" y1="200" x2="200" y2="250" stroke-dasharray="4 10"  style="animation-delay:1s"></line></g><circle cx="400" cy="200" r="80" fill="url(#you-glow)"  style="transform-origin:400px 200px;transform-box:fill-box"></circle><g><g><circle cx="400" cy="200" r="28" fill="#b4f953" stroke="#b4f953" stroke-width="2.5"></circle><text x="400" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#0a0a0a">YOU</text></g><g><circle cx="260" cy="120" r="18" fill="#8bc34a" stroke="#b4f953" stroke-width="1.5"></circle><circle cx="260" cy="120" r="8" fill="#b4f953" opacity="0.71"  style="transform-origin:260px 120px;animation-delay:0.30s"></circle></g><g><circle cx="540" cy="120" r="18" fill="#8bc34a" stroke="#b4f953" stroke-width="1.5"></circle><circle cx="540" cy="120" r="8" fill="#b4f953" opacity="0.6699999999999999"  style="transform-origin:540px 120px;animation-delay:0.60s"></circle></g><g><circle cx="200" cy="250" r="16" fill="#8bc34a" stroke="#b4f953" stroke-width="1.5"></circle><circle cx="200" cy="250" r="6" fill="#b4f953" opacity="0.6"  style="transform-origin:200px 250px;animation-delay:0.90s"></circle></g><g><circle cx="600" cy="250" r="16" fill="#2d3a1a" stroke="#b4f953" stroke-width="1