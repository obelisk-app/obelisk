services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-obelisk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-obelisk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-obelisk}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - obelisk

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "40000-40100:40000-40100/udp"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-obelisk}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-obelisk}
      NODE_ENV: production
      CORS_ORIGIN: https://${DOMAIN}
      MEDIASOUP_ANNOUNCED_IP: ${PUBLIC_IP}
    volumes:
      # Persist user uploads across container restarts. The path inside the
      # container matches getUploadDir() in src/app/api/upload/route.ts and the
      # GET handler at src/app/uploads/[name]/route.ts.
      - uploads:/app/uploads
    networks:
      - obelisk

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env.production}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - obelisk

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  uploads:

networks:
  obelisk:
